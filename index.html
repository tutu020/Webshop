<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webshop</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Link to CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="modern-header">
    <div class="header-top">
        <input type="search" class="search-input" placeholder="Search products..." id="searchBox">
    </div>
    <h1>School/Study Essentials</h1>
</header>

<div class="informatie">
    <p3>Wat hebben wij in de shop</p3>
    <p2>Schoolspullen vind je op onze website: notebooks, pennen, laptop sleeves en meer!</p2>
    <p1 class="warning-text">Lenen kost geld!</p1>

    <div class="buttons-container">
        <button class="btn-bestel"> Bestel nu </button>
        <button class="btn-bekijk"> Bekijk alle producten </button>
        <button class="btn-aantal"> Aantal bestellingen </button>
    </div>

    <!-- Video container -->
    <div id="video-container" style="text-align:center; margin-top: 2rem;"></div>
</div>

<!-- JavaScript voor video en2 header shrink -->
<script>
const header = document.querySelector("header");

window.addEventListener("scroll", () => {
    if (window.scrollY > 50) {
        header.classList.add("shrink");
    } else {
        header.classList.remove("shrink");
    }
});

const searchBox = document.getElementById('searchBox');
const videoContainer = document.getElementById('video-container');

searchBox.addEventListener('input', function() {
    const query = searchBox.value.toLowerCase().trim();

    // Video verschijnt alleen als je "epstein" typt
    if(query === "epstein") {
        videoContainer.innerHTML = `
            <iframe width="560" height="315" 
            src="https://www.youtube.com/embed/iDR41AQKH1c?autoplay=1&mute=1" 
            title="YouTube video" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        `;
    } else {
        videoContainer.innerHTML = ''; // video verdwijnt als zoekterm anders is
    }
})
</script>
</body>
</html>
